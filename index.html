<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="">
    <form class="w-[420px] mx-auto mt-16 bg-gray-100 py-8 rounded-xl shadow-2xl shadow-">
        <div class="logo-area flex flex-col justify-center items-center">
            <img src="./assets/github-logo.png" alt="">
            <h2 class="text-3xl font-semibold mt-4 mb-1">GitHub Issues Tracker</h2>
            <p class="text-gray-500 font-semibold">Sign in to manage your issues</p>
        </div>
        <div class="input-field flex flex-col mt-8 px-8 gap-1">
            <label class="cursor-pointer text-lg font-semibold text-gray-500" for="user-name">Username</label>
            <input class=" border-gray-400 py-1.5 rounded-md outline-indigo-300 px-3" type="text" id="user-name" placeholder="usrname: admin">

            <label class="cursor-pointer text-lg font-semibold text-gray-500 mt-3" for="password">Password</label>
            <input class="border-gray-400 py-1.5 rounded-md outline-indigo-300 px-3" type="password" id="password" placeholder="password: admin123">

            <button id="form-submit" class="mt-6 bg-blue-700 text-white text-lg font-semibold rounded-lg py-1.5 text-center w-full cursor-pointer">Sign In</button>
        </div>
    </form>

    <script src="script.js"></script>
</body>
</html>
